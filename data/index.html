<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🍌 Banana Clock 🕗</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body data-theme="dark">
  <div class="container">
    <header>
      <h2>🍌 Banana Clock 🕗</h2>
      <div class="time"><span id="clock">--:--:--</span></div>
    </header>

    <section>
      <button class="big-btn" onclick="syncWithClient()">Синхронизировать с клиентом</button>
      <div class="label">Установить время вручную</div>
      <form id="setForm" class="inline-form">
        <input name="h" type="number" min="0" max="23" placeholder="Часы" required>
        <input name="m" type="number" min="0" max="59" placeholder="Минуты" required>
        <input type="submit" value="Установить">
      </form>
    </section>

    <hr>

    <section>
      <div class="label">Яркость дисплея</div>
      <div class="slider-container">
        <input type="range" id="brightness" min="0" max="7">
      </div>
      <div class="brightness-val">Текущее значение: <b id="bval">7</b></div>
    </section>

    <hr>

    <section>
      <div class="label">Писк каждый час</div>
      <div class="toggle-row">
        <span class="toggle-label" id="chimeLabel">Включено</span>
        <label class="switch">
          <input type="checkbox" id="chimeSwitch" onchange="toggleChime()">
          <span class="slider-round"></span>
        </label>
      </div>
    </section>


    <div class="theme-toggle">
      <span class="toggle-text">Тёмная тема</span>
      <label class="switch">
        <input type="checkbox" id="themeSwitch" onchange="toggleTheme()">
        <span class="slider-round"></span>
      </label>
    </div>

    <footer>Banana Clock &copy; Herman Guilliman</footer>
  </div>
  <div id="toast" class="toast"></div>
  <script src="/script.js"></script>
</body>

</html>
