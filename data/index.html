<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🍌 Banana Clock 🕗</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body data-theme="dark">
  <div class="container">
    <header>
      <h2>🍌 Banana Clock 🕗</h2>
      <div class="time"><span id="clock">--:--:--</span></div>
    </header>

    <section>
      <button class="big-btn" onclick="syncWithClient()">Синхронизировать с клиентом</button>
      <div class="label">Установить время вручную</div>
      <form id="setForm" class="inline-form">
        <input name="h" type="number" min="0" max="23" placeholder="Часы" required>
        <input name="m" type="number" min="0" max="59" placeholder="Минуты" required>
        <input type="submit" value="Установить">
      </form>
    </section>

    <hr>

    <section>
      <div class="label">Яркость дисплея</div>
      <div class="slider-container">
        <input type="range" id="brightness" min="0" max="7">
      </div>
      <div class="brightness-val">Текущее значение: <b id="bval">7</b></div>
    </section>

    <hr>

    <section>
      <div class="label">Мелодии и анимации</div>
      <div class="settings-grid">
        <div class="setting-item">
          <label>При старте (звук)</label>
          <select id="sm">
            <option value="0">Нет</option>
            <optgroup label="Мелодии">
              <option value="1">Тетрис</option>
              <option value="2">Звёздные войны</option>
              <option value="3">Инспектор Гаджет</option>
            </optgroup>
            <optgroup label="Ретро эффекты">
              <option value="4">Монетка</option>
              <option value="5">Смерть Пакмана</option>
              <option value="6">Бонус (Power Up)</option>
              <option value="7">Лазер</option>
              <option value="8">Доп. жизнь (1-Up)</option>
              <option value="9">Прыжок</option>
            </optgroup>
          </select>
        </div>

        <div class="setting-item">
          <label>При старте (анимация)</label>
          <select id="sa">
            <option value="0">Нет</option>
            <option value="1">Заполнение</option>
            <option value="2">Спиннер</option>
            <option value="3">Отсчёт</option>
            <option value="4">Пульс</option>
            <option value="5">Змейка</option>
            <option value="6">Рандом</option>
          </select>
        </div>

        <div class="setting-item">
          <label>Ежечасно (звук)</label>
          <select id="hm">
            <option value="0">Нет</option>
            <optgroup label="Мелодии">
              <option value="1">Тетрис</option>
              <option value="2">Звёздные войны</option>
              <option value="3">Инспектор Гаджет</option>
            </optgroup>
            <optgroup label="Ретро эффекты">
              <option value="4">Монетка</option>
              <option value="5">Смерть Пакмана</option>
              <option value="6">Бонус (Power Up)</option>
              <option value="7">Лазер</option>
              <option value="8">Доп. жизнь (1-Up)</option>
              <option value="9">Прыжок</option>
            </optgroup>
          </select>
        </div>

        <div class="setting-item">
          <label>Ежечасно (анимация)</label>
          <select id="ha">
            <option value="0">Нет</option>
            <option value="1">Заполнение</option>
            <option value="2">Спиннер</option>
            <option value="3">Отсчёт</option>
            <option value="4">Пульс</option>
            <option value="5">Змейка</option>
            <option value="6">Рандом</option>
          </select>
        </div>
      </div>

      <div class="test-btns">
        <button class="test-btn" onclick="playTest('startup')">▶ Старт</button>
        <button class="test-btn" onclick="playTest('hourly')">▶ Ежечасно</button>
      </div>

      <button class="big-btn" onclick="saveSettings()">Сохранить настройки</button>
    </section>

    <!-- ИЗМЕНЕНО: Новый кроссбраузерный тумблер -->
    <div class="theme-toggle">
      <span class="toggle-text">Тёмная тема</span>
      <label class="switch">
        <input type="checkbox" id="themeSwitch" onchange="toggleTheme()">
        <span class="slider-round"></span>
      </label>
    </div>

    <footer>Banana Clock &copy; Herman Guilliman</footer>
  </div>
  <div id="toast" class="toast"></div>
  <script src="/script.js"></script>
</body>

</html>
